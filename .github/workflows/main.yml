name: Build and Release MyProxy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate Icon.png
        run: go run ./tools/genicon

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build for Windows and Linux
        run: |
          fyne-cross windows -app-id com.lucastq.myproxy -output proxy-gui ./cmd/gui
          fyne-cross linux -app-id com.lucastq.myproxy -output proxy-gui ./cmd/gui

      - name: Upload build artifacts (Windows, Linux)
        uses: actions/upload-artifact@v4
        with:
          name: myproxy-linux-windows
          path: fyne-cross/dist/**

  build-darwin:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate Icon.png
        run: go run ./tools/genicon

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build for macOS
        run: fyne-cross darwin -app-id com.lucastq.myproxy -output proxy-gui ./cmd/gui

      - name: Upload build artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: myproxy-darwin
          path: fyne-cross/dist/**

  release:
    needs: [build-linux-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: myproxy-*
          path: release-files
          merge-multiple: true

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: Release ${{ github.run_id }}
          files: release-files/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
